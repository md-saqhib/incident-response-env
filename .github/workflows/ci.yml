name: CI

on:
  push:
    branches: ["main", "hf-submit-fix"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check
        run: |
          python -m py_compile inference.py app/env.py app/main.py

      - name: Run tests
        run: |
          pytest -q test_inference.py test_env.py test_api.py
