name: IncidentResponseEnv
version: "1.0.0"
description: >
  A production incident response simulation environment.
  An LLM agent receives live alerts, logs, and metrics from a degraded system
  and must investigate, diagnose the root cause, and apply the correct fix
  before the system fully fails. Reward is partial and time-sensitive.

observation_space:
  type: dict
  properties:
    task_id:
      type: string
    task_difficulty:
      type: string
      enum: [easy, medium, hard]
    step_count:
      type: integer
    max_steps:
      type: integer
    time_budget:
      type: integer
    time_remaining:
      type: integer
    alerts:
      type: array
      items:
        type: object
    metrics:
      type: array
      items:
        type: object
    recent_logs:
      type: array
      items:
        type: object
    services:
      type: object
    done:
      type: boolean
    reward:
      type: number
    total_reward:
      type: number
    message:
      type: string

action_space:
  type: dict
  properties:
    action_type:
      type: string
      enum: [investigate, diagnose, fix, check_metrics, escalate]
    target:
      type: string
      description: "Service name or component to act on"
    details:
      type: string
      description: "Additional context for diagnose or fix actions"
  required:
    - action_type
    - target
    - details

tasks:
  - id: single_service_down
    difficulty: easy
    description: "A single microservice is OOM and down. Clear evidence in logs."
    max_steps: 10
    time_budget: 300
    reward_threshold: 0.5

  - id: cascading_failure
    difficulty: medium
    description: "DB connection exhaustion causes cascading failure across services. Alerts show symptoms, not root cause."
    max_steps: 15
    time_budget: 300
    reward_threshold: 0.5

  - id: memory_leak
    difficulty: hard
    description: "Silent memory leak growing for 6 hours. No CRITICAL alert. Agent must correlate metric trends."
    max_steps: 20
    time_budget: 300
    reward_threshold: 0.5

reward:
  range: [0.0, 1.0]
  partial_signals: true
  components:
    - name: correct_diagnosis
      weight: 0.40
    - name: correct_fix
      weight: 0.35
    - name: time_bonus
      weight: 0.15
      description: "Proportional to time_remaining / time_budget at fix time"
    - name: efficiency_bonus
      weight: 0.10
      description: "1 - (wrong_actions / total_actions)"

api_endpoints:
  reset:
    method: POST
    path: /reset
    description: "Initialize or reset the environment"
  step:
    method: POST
    path: /step
    description: "Take an action in the environment"
  state:
    method: GET
    path: /state
    description: "Get current environment state"
  tasks:
    method: GET
    path: /tasks
    description: "Get list of available tasks"
  health:
    method: GET
    path: /health
    description: "Health check endpoint"
